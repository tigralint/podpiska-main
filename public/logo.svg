<svg width="40" h="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="capsule_bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.12" />
      <stop offset="1" stop-color="white" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="dot_grad" x1="12" y1="12" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00F2FE" />
      <stop offset="1" stop-color="#4FACFE" />
    </linearGradient>
  </defs>
  
  <!-- Glass Capsule -->
  <rect x="4" y="12" width="32" height="16" rx="8" fill="url(#capsule_bg)" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  
  <!-- Glowing Indicator Dot -->
  <circle cx="14" cy="20" r="5" fill="url(#dot_grad)" filter="url(#glow)">
    <animate attributeName="cx" values="14;26;14" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    <animate attributeName="opacity" values="1;0.7;1" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
